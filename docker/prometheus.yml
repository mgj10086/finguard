global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "finguard-api"
    static_configs:
      - targets: ["finguard-api:8000"]
    metrics_path: "/metrics"

  - job_name: "milvus"
    static_configs:
      - targets: ["milvus-standalone:9091"]

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
